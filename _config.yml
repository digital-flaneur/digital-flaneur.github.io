# Site settings
title: Charles Cui
description: Charles Cui — Researcher in human-AI collaboration, data visualization, and education.
url: https://digital-flaneur.github.io
baseurl: ""
lang: en

# Author
author:
  name: Charles Cui
  email: yuancui@u.northwestern.edu

# Social
github_username: digital-flaneur
linkedin_username: yuan-charles-cui
scholar_userid: 49hT38kAAAAJ

# Build
markdown: kramdown
kramdown:
  input: GFM
include: ["_pages"]
exclude:
  - bin
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - Dockerfile
  - docker-compose.yml
  - docker-local.yml
  - reports
  - PLAN.md
keep_files:
  - CNAME
  - .nojekyll
  - .git

# Plugins
plugins:
  - jekyll-sitemap

# Defaults
defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false
