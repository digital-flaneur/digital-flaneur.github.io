- date: 2025-06-16
  text: "I started my internship at Adobe in San Jose, California. I'm working on Adobe Customer Journey Analytics (B2B product). Happy to connect with folks in the Bay Area this summer!"

- date: 2025-04-11
  text: "I have been selected to participate in the 12th <a href='https://www.heidelberg-laureate-forum.org/about-us/'>Heidelberg Laureate Forum (HLF)</a> in Heidelberg, Germany this September."

- date: 2025-04-07
  text: "I will be presenting a poster at the <a href='https://www.grc.org/visualization-in-science-and-education-conference/2025/'>Visualization in Science and Education Gordon Research Seminar</a> this July in Lewiston, Maine."

- date: 2025-04-05
  text: "I got accepted into the <a href='https://aied2025.itd.cnr.it/index.php/maintrack/doctoral-consortium/'>AIED Doctoral Consortium</a>. Let's meet up in Palermo, Italy in July at AIED+EDM+L@S!"

- date: 2025-02-20
  text: "Our paper, <a href='/assets/pdf/avec.pdf'>AVEC: An Assessment of Visual Encoding Ability in Visualization Construction</a>, is accepted to CHI 2025. Let's meet up in Yokohama, Japan in April!"

- date: 2024-12-01
  text: "I started working as a visiting student researcher at <a href='https://fig-x.github.io/workwithus'>FIGX Lab</a> with <a href='https://www.fmyang.com/'>Dr. Fumeng Yang</a> at the University of Maryland, College Park."
